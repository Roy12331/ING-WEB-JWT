<main class="auth-page">
  <section class="auth-card" aria-labelledby="login-title">
    <h1 id="login-title">Iniciar sesión</h1>
    <p class="auth-subtitle">Ingresa tus credenciales para continuar.</p>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="auth-form">
      <div class="field-group">
        <label for="username">Usuario</label>
        <input id="username" type="text" formControlName="username" autocomplete="username" />
        @if (loginForm.controls.username.touched && loginForm.controls.username.invalid) {
          <small class="error-text">El usuario es obligatorio.</small>
        }
      </div>

      <div class="field-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password" />
        @if (loginForm.controls.password.touched && loginForm.controls.password.invalid) {
          <small class="error-text">La contraseña es obligatoria.</small>
        }
      </div>

      <button type="submit" class="submit-btn" [disabled]="submitting()">
        {{ submitting() ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </section>
</main>
